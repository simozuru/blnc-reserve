<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blnc 予約システム</title>
  <style>
    :root { --primary: #111; }
    body { font-family: sans-serif; background: #f9f9f9; padding: 20px; color: #333; }
    .box { max-width: 450px; margin: auto; background: #fff; padding: 25px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
    h1 { text-align: center; font-size: 22px; margin-bottom: 25px; }
    label { font-size: 13px; font-weight: bold; display: block; margin-top: 15px; margin-bottom: 5px; }
    input, select, button { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
    button { background: var(--primary); color: #fff; font-weight: bold; cursor: pointer; margin-top: 25px; transition: 0.2s; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    #msg { margin-top: 20px; text-align: center; font-weight: bold; font-size: 14px; }
  </style>
</head>
<body>

<div class="box">
  <h1>Blnc 予約入力</h1>
  <form id="reservationForm">
    <label>お名前</label>
    <input name="name" required placeholder="山田 太郎">
    
    <label>電話番号</label>
    <input name="tel" type="tel" required placeholder="09012345678">

    <label>メールアドレス</label>
    <input name="email" type="email" required placeholder="example@mail.com">
    
    <label>メニュー</label>
    <select name="menu" id="menu" onchange="updateTimeSlots()">
      <option>カット</option><option>ヘアカラー</option><option>パーマ</option><option>縮毛矯正</option>
    </select>

    <label>スタイリスト</label>
    <select name="staff" id="staff" onchange="updateTimeSlots()">
      <option>指名なし</option><option>下鶴</option><option>来馬</option><option>矢野</option>
    </select>

    <label>ご希望日</label>
    <input type="date" name="date" id="date" required onchange="updateTimeSlots()">

    <label>ご希望時間</label>
    <select name="time" id="time" required disabled><option>先に日付を選択してください</option></select>

    <button type="submit" id="submit-btn">この内容で予約する</button>
  </form>
  <p id="msg"></p>
</div>

<script>
const gasUrl = "https://script.google.com/macros/s/AKfycbwv6mvtMHdwjjXI4Bv0m6b5O4Lay0aeqaopXzhWjgwS3v_WCC6lFaDB2Hdqo6zo0KZe/exec";

// 日付の初期値を今日に設定
document.getElementById('date').min = new Date().toISOString().split('T')[0];

async function updateTimeSlots() {
  const [staff, date, menu] = [document.getElementById("staff").value, document.getElementById("date").value, document.getElementById("menu").value];
  const timeSelect = document.getElementById("time");
  if (!date) return;

  timeSelect.innerHTML = '<option>確認中...</option>';
  try {
    const res = await fetch(`${gasUrl}?date=${date}&staff=${encodeURIComponent(staff)}&menu=${encodeURIComponent(menu)}`);
    const data = await res.json();
    timeSelect.innerHTML = "";
    
    // 9:00〜18:30までの30分刻みを生成
    for(let h=9; h<19; h++) {
      for(let m=0; m<60; m+=30) {
        if(h==18 && m==30) continue; 
        const timeStr = ("0"+h).slice(-2) + ":" + ("0"+m).slice(-2);
        const opt = document.createElement("option");
        opt.value = timeStr;
        
        if(data.bookedTimes.includes(timeStr)) {
          opt.textContent = `${timeStr} ── 予約不可`;
          opt.disabled = true;
        } else {
          opt.textContent = timeStr;
        }
        timeSelect.appendChild(opt);
      }
    }
    timeSelect.disabled = (timeSelect.options.length === 0);
  } catch(e) {
    timeSelect.innerHTML
