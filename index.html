<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blnc オンライン予約システム</title>
  <style>
    :root {
      --primary-color: #2c3e50;
      --accent-color: #e74c3c;
      --bg-color: #f8f9fa;
      --card-bg: #ffffff;
      --text-color: #333333;
      --border-color: #dddddd;
    }
    body {
      font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      line-height: 1.6;
      margin: 0;
      padding: 20px;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      background: var(--card-bg);
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    h1 {
      text-align: center;
      color: var(--primary-color);
      margin-bottom: 30px;
      font-size: 24px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      color: var(--primary-color);
    }
    input[type="text"], input[type="tel"], input[type="email"], input[type="date"], select {
      width: 100%;
      padding: 10px;
      border: 1px solid var(--border-color);
      border-radius: 4px;
      box-sizing: border-box;
      font-size: 16px;
    }
    input:focus, select:focus {
      border-color: var(--primary-color);
      outline: none;
    }
    .time-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-top: 10px;
    }
    .time-slot {
      padding: 10px;
      text-align: center;
      background-color: #e9ecef;
      border: 1px solid var(--border-color);
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }
    .time-slot:hover {
      background-color: #dee2e6;
    }
    .time-slot.selected {
      background-color: var(--primary-color);
      color: white;
      border-color: var(--primary-color);
    }
    .time-slot.disabled {
      background-color: #f8d7da;
      color: #721c24;
      cursor: not-allowed;
      opacity: 0.6;
    }
    .time-slot.holiday {
      grid-column: 1 / -1;
      background-color: #fff3cd;
      color: #856404;
      cursor: not-allowed;
      padding: 20px;
    }
    button[type="submit"] {
      width: 100%;
      padding: 14px;
      background-color: var(--primary-color);
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 20px;
      transition: background-color 0.2s;
    }
    button[type="submit"]:hover {
      background-color: #34495e;
    }
    button[type="submit"]:disabled {
      background-color: #95a5a6;
      cursor: not-allowed;
    }
    .loading-msg {
      grid-column: 1 / -1;
      text-align: center;
      padding: 20px;
      color: #666;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Blnc 予約フォーム</h1>
  <form id="reservationForm">
    
    <div class="form-group">
      <label for="name">お名前（必須）</label>
      <input type="text" id="name" name="name" required placeholder="山田 太郎">
    </div>

    <div class="form-group">
      <label for="name_kana">フリガナ（必須）</label>
      <input type="text" id="name_kana" name="name_kana" required placeholder="ヤマダ タロウ">
    </div>

    <div class="form-group">
      <label for="tel">電話番号（必須・ハイフン可）</label>
      <input type="tel" id="tel" name="tel" required placeholder="09012345678">
    </div>

    <div class="form-group">
      <label for="email">メールアドレス（任意）</label>
      <input type="email" id="email" name="email" placeholder="your@email.com">
    </div>

    <div class="form-group">
      <label for="staff">スタイリスト指名（必須）</label>
      <select id="staff" name="staff" required>
        <option value="指名なし">指名なし（最速の枠をご案内）</option>
        <option value="下鶴">下鶴</option>
        <option value="来馬">来馬</option>
        <option value="矢野">矢野</option>
      </select>
    </div>

    <div class="form-group">
      <label for="menu">メニュー（必須）</label>
      <select id="menu" name="menu" required>
        <option value="カット">カット (60分)</option>
        <option value="ヘアカラー">ヘアカラー (120分)</option>
        <option value="パーマ">パーマ (120分
