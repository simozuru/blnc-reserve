<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Blnc予約</title>
  <style>
    body { font-family: sans-serif; background: #f5f5f5; padding: 20px; }
    .box { max-width: 420px; margin: auto; background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    h1 { text-align: center; font-size: 24px; margin-bottom: 20px; }
    label { font-size: 14px; color: #555; display: block; margin-top: 10px; }
    input, select, button { width: 100%; padding: 12px; margin: 6px 0 12px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
    button { background: #111; color: #fff; border: none; cursor: pointer; margin-top: 15px; }
    button:disabled { background: #ccc; }
    #msg { margin-top: 15px; text-align: center; font-weight: bold; color: #d32f2f; }
    .success { color: #2e7d32 !important; }
  </style>
</head>
<body>

<div class="box">
  <h1>Blnc予約</h1>
  
  <label for="name">お名前</label>
  <input id="name" placeholder="山田 太郎">

  <label for="tel">電話番号</label>
  <input id="tel" type="tel" placeholder="09012345678">

  <label for="menu">メニュー</label>
  <select id="menu">
    <option>カット ¥5000</option>
    <option>カラー ¥7000</option>
    <option>ヘッドスパカラー ¥8000</option>
    <option>パーマ ¥13500</option>
    <option>縮毛矯正 ¥18000</option>
  </select>

  <label for="staff">スタイリスト</label>
  <select id="staff" onchange="updateTimeSlots()">
    <option>指名なし</option>
    <option>下鶴</option>
    <option>来馬</option>
    <option>矢野</option>
  </select>

  <label for="date">ご希望日</label>
  <input type="date" id="date" onchange="updateTimeSlots()">

  <label for="time">ご希望時間</label>
  <select id="time" disabled>
    <option value="">日付とスタイリストを選んでください</option>
  </select>

  <button id="submit-btn" onclick="sendReserve()">予約する</button>

  <p id="msg"></p>
</div>

<script>
// 【重要】あなたの最新のGASのWebアプリURLに書き換えてください
const gasUrl = "https://script.google.com/macros/s/AKfycbxFjZku3VpVlymoFU9OExXLEe3NLBXpF5mZJtG-zQrtX3dg0drOC0tzmnlR5ar8xNK2/exec";

window.onload = function(){
  // 今日以降の日付しか選べないようにする
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('date').min = today;
};

// 空き状況を考慮して時間選択肢を更新する関数
// 【原因調査・強化版】空き状況を考慮して時間選択肢を更新する関数
async function updateTimeSlots() {
  const staff = document.getElementById("staff").value;
  const date = document.getElementById("date").value;
  const timeSelect = document.getElementById("time");
  const msgEl = document.getElementById("msg");

  if (!date) {
    timeSelect.disabled = true;
    timeSelect.innerHTML = '<option value="">日付を選択してください</option>';
    return;
  }

  timeSelect.disabled = true;
  timeSelect.innerHTML = '<option value="">空き状況を確認中...</option>';
  msgEl.innerText = "";

  try {
    const fullUrl = `${gasUrl}?date=${date}&staff=${encodeURIComponent(staff)}`;
    console.log("通信先URL:", fullUrl); // ブラウザのF12コンソールで確認用

    const response = await fetch(fullUrl);
    
    // 通信自体が成功したかチェック
    if (!response.ok) {
        throw new Error(`GASへの通信に失敗しました (ステータス: ${response.status})`);
    }

    const textData = await response.text();
    console.log("GASからの返答:", textData); // 届いた中身を表示

    // 届いた中身がJSON（{...}）の形をしているかチェック
    if (!textData.trim().startsWith('{')) {
        throw new Error("GASがデータではなくエラー画面（HTML）を返しています。デプロイ設定を確認してください。");
    }

    const data = JSON.parse(textData);
    const bookedTimes = data.bookedTimes || [];

    // --- ここから下の選択肢生成処理は同じ ---
    timeSelect.innerHTML = "";
    let availableCount = 0;
    for(let h=9; h<=18; h++){
      for(let m=0; m<60; m+=30){
        if(h==18 && m>0) continue;
        const hh = ("0"+h).slice(-2);
        const mm = ("0"+m).slice(-2);
        const timeStr = hh + ":" + mm;
        const opt = document.createElement("option");
        opt.value = timeStr;
        if (bookedTimes.includes(timeStr)) {
          opt.textContent = timeStr + " (× 予約済み)";
          opt.disabled = true;
          opt.style.color = "#ccc";
        } else {
          opt.textContent = timeStr + " (◯ 空きあり)";
          availableCount++;
        }
        timeSelect.appendChild(opt);
      }
    }
    if(availableCount === 0) {
      timeSelect.innerHTML = '<option value="">この日は満席です</option>';
    } else {
      timeSelect.disabled = false;
    }

  } catch (e) {
    console.error("エラー詳細:", e);
    timeSelect.innerHTML = '<option value="">エラーが発生しました</option>';
    // 画面に具体的なエラーメッセージを出す（これで原因がわかります）
    msgEl.innerText = "【原因】" + e.message;
  }
}

// 予約送信処理
async function sendReserve(){
  const msgEl = document.getElementById("msg");
  const btnEl = document.getElementById("submit-btn");
  
  const name = document.getElementById("name").value.trim();
  const tel = document.getElementById("tel").value.trim();
  const menu = document.getElementById("menu").value;
  const staff = document.getElementById("staff").value;
  const date = document.getElementById("date").value;
  const time = document.getElementById("time").value;

  if(!name || !tel || !date || !time) {
    msgEl.className = "";
    msgEl.innerText = "すべての項目を正しく入力してください。";
    return;
  }

  btnEl.disabled = true;
  msgEl.className = "";
  msgEl.innerText = "予約処理中...";

  const formData = new URLSearchParams();
  formData.append("name", name);
  formData.append("tel", tel);
  formData.append("menu", menu);
  formData.append("staff", staff);
  formData.append("date", date);
  formData.append("time", time);

  try {
    const response = await fetch(gasUrl, {
      method: "POST",
      body: formData,
      headers: { "Content-Type": "application/x-www-form-urlencoded" }
    });

    const resultText = await response.text();
    msgEl.innerText = resultText;

    if(resultText.includes("完了")) {
      msgEl.className = "success";
      document.getElementById("name").value = "";
      document.getElementById("tel").value = "";
      // 予約が完了したら、即座に空き時間を再表示
      await updateTimeSlots();
    }

  } catch(e) {
    msgEl.className = "";
    msgEl.innerText = "通信エラーが発生しました。";
  } finally {
    btnEl.disabled = false;
  }
}
</script>
</body>
</html>
