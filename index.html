<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIS Web Reservation - ver 3.8.3</title>
  <style>
    :root {
      --primary-color: #4a4a4a;
      --accent-color: #9a8873;
      --bg-color: #f8f9fa;
      --card-bg: #ffffff;
      --text-color: #333333;
      --border-color: #dddddd;
      --danger-color: #cc0000;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Helvetica Neue', Arial, sans-serif; }
    body { background-color: var(--bg-color); color: var(--text-color); padding: 20px; display: flex; justify-content: center; }
    .container { max-width: 600px; width: 100%; background: var(--card-bg); padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    h1 { font-size: 24px; text-align: center; margin-bottom: 5px; color: var(--primary-color); letter-spacing: 1px; }
    .subtitle { text-align: center; font-size: 13px; color: #888; margin-bottom: 25px; }
    
    .tabs { display: flex; border-bottom: 2px solid var(--border-color); margin-bottom: 25px; }
    .tab-btn { flex: 1; padding: 12px; text-align: center; background: none; border: none; font-size: 15px; font-weight: bold; color: #888; cursor: pointer; transition: all 0.2s; }
    .tab-btn.active { color: var(--accent-color); border-bottom: 3px solid var(--accent-color); margin-bottom: -2px; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .form-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 14px; color: var(--primary-color); }
    input[type="text"], input[type="tel"], input[type="email"], input[type="date"], select, textarea {
      width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 15px; background-color: #fff; transition: border-color 0.2s;
    }
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent-color); }
    textarea { resize: vertical; min-height: 80px; }
    
    .btn-submit {
      width: 100%; padding: 15px; background-color: var(--accent-color); color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background-color 0.2s; margin-top: 10px;
    }
    .btn-submit:hover { background-color: #857461; }
    .btn-submit:disabled { background-color: #ccc; cursor: not-allowed; }
    .note { font-size: 12px; color: #666; margin-top: 5px; }

    .change-alert-banner { display: none; background-color: #f4f0ec; border: 2px dashed var(--accent-color); padding: 15px; border-radius: 6px; margin-bottom: 20px; font-size: 14px; color: #555; }
    .change-alert-banner strong { color: var(--accent-color); }
    .btn-cancel-change { background: none; border: none; color: var(--danger-color); font-weight: bold; cursor: pointer; text-decoration: underline; margin-left: 10px; }

    .reservation-card { border: 1px solid var(--border-color); border-left: 6px solid var(--accent-color); padding: 18px; border-radius: 8px; margin-bottom: 18px; background-color: #faf9f7; text-align: left; }
    .res-row { font-size: 15px; margin-bottom: 8px; color: #444; line-height: 1.4; }
    .res-label { font-weight: bold; color: var(--primary-color); display: inline-block; width: 85px; }
    .res-id-badge { display: inline-block; padding: 2px 6px; background-color: #e0d9d0; color: #555; font-size: 11px; font-weight: bold; border-radius: 4px; margin-left: 5px; }
    .res-created { font-size: 12px; color: #888; margin-top: 12px; border-top: 1px dashed #e0e0e0; padding-top: 8px; }
    
    .btn-action-group { display: flex; gap: 10px; margin-top: 12px; }
    .btn-change {
      flex: 1; text-align: center; padding: 10px; background-color: var(--accent-color); color: white; border: none; border-radius: 4px; font-size: 13px; font-weight: bold; cursor: pointer; transition: all 0.2s;
    }
    .btn-change:hover { background-color: #857461; }
    .btn-cancel {
      flex: 1; text-align: center; padding: 10px; background-color: #fff; color: var(--danger-color); border: 1px solid var(--danger-color); border-radius: 4px; font-size: 13px; font-weight: bold; cursor: pointer; transition: all 0.2s;
    }
    .btn-cancel:hover { background-color: #fff5f5; }
    .no-data { text-align: center; color: #666; padding: 20px; font-size: 14px; }
  </style>
</head>
<body>

<div class="container">
  <h1>SIS WEB RESERVATION</h1>
  <div class="subtitle">サロン予約システム (Version 3.8.3)</div>

  <div class="tabs">
    <button id="tab-btn-reserve" class="tab-btn active" onclick="switchTab(this, 'reserve-tab')">新規予約</button>
    <button id="tab-btn-check" class="tab-btn" onclick="switchTab(this, 'check-tab')">予約の確認・キャンセル</button>
  </div>

  <div id="reserve-tab" class="tab-content active">
    <div id="change-banner" class="change-alert-banner">
      現在 <strong>【予約日時を変更中】</strong> です。<br>
      新しい日時を選択して、一番下の「変更を確定する」ボタンを押してください。
      <button type="button" class="btn-cancel-change" onclick="abortChangeMode()">➔ 変更をやめる</button>
    </div>

    <form id="reservation-form">
      <div class="form-group">
        <label for="date">ご来店希望日 *</label>
        <input type="date" id="date" required>
      </div>

      <div class="form-group">
        <label for="staff">担当スタッフ *</label>
        <select id="staff" required>
          <option value="指名なし">指名なし </option>
          <option value="下鶴">下鶴</option>
          <option value="来馬">来馬</option>
          <option value="矢野">矢野</option>
        </select>
      </div>

      <div class="form-group">
        <label for="menu">施術メニュー *</label>
        <select id="menu" required>
          <option value="">メニューを選択してください</option>
          <option value="カット">カット</option>
          <option value="カラー">カラー</option>
          <option value="パーマ">パーマ</option>
          <option value="縮毛矯正">縮毛矯正</option>
        </select>
      </div>

      <div class="form-group">
        <label for="time">ご来店希望時間 *</label>
        <select id="time" required disabled>
          <option value="">日付を選択してください</option>
        </select>
      </div>

      <hr style="border: 0; border-top: 1px solid var(--border-color); margin: 30px 0;">

      <div class="form-group">
        <label for="name">お名前 (漢字) *</label>
        <input type="text" id="name" required placeholder="山田 太郎">
      </div>

      <div class="form-group">
        <label for="name_kana">お名前 (フリガナ) *</label>
        <input type="text" id="name_kana" required placeholder="ヤマダ タロウ">
      </div>

      <div class="form-group">
        <label for="tel">携帯電話番号 *</label>
        <input type="tel" id="tel" required placeholder="09012345678" pattern="^[0-9\-]+$">
        <div class="note">ハイフンはあってもなくても構いません</div>
      </div>

      <div class="form-group">
        <label for="email">メールアドレス *</label>
        <input type="email" id="email" required placeholder="example@gmail.com">
        <div class="note">予約の確認・自動キャンセル時に使用します</div>
      </div>

      <div class="form-group">
        <label for="memo">ご要望・備考</label>
        <textarea id="memo" placeholder="髪型のご相談や、お急ぎの時間などがあればご記入ください"></textarea>
      </div>

      <button type="submit" id="submit-btn" class="btn-submit" disabled>上記の内容で予約を確定する</button>
    </form>
  </div>

  <div id="check-tab" class="tab-content">
    <div class="form-group">
      <label for="check-tel">ご登録の携帯電話番号</label>
      <input type="tel" id="check-tel" placeholder="09012345678">
    </div>
    
    <div class="form-group">
      <label for="check-email">ご登録のメールアドレス</label>
      <input type="email" id="check-email" placeholder="example@gmail.com">
      <div class="note">ご予約時に入力した「電話番号」と「メールアドレス」で検索します。</div>
    </div>
    
    <button type="button" id="check-btn" class="btn-submit" onclick="fetchReservations()">ご予約状況を確認する</button>

    <hr style="border: 0; border-top: 1px solid var(--border-color); margin: 30px 0;">
    
    <div id="check-results-area">
      <div class="no-data">情報を入力して確認ボタンを押してください。</div>
    </div>
  </div>

</div>

<script>
  const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwIfm3FzwWCqXJ1q0Nvy9QYpudu-vNoA4mE3z-PTDXBNh46Zm74vvLU9VvEAItEKJgf/exec";

  let changeModeData = null;

  function switchTab(buttonEl, tabId) {
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
    
    if (buttonEl) {
      buttonEl.classList.add('active');
    }
    document.getElementById(tabId).classList.add('active');
  }

  const form = document.getElementById('reservation-form');
  const dateInput = document.getElementById('date');
  const staffSelect = document.getElementById('staff');
  const menuSelect = document.getElementById('menu');
  const timeSelect = document.getElementById('time');
  const submitBtn = document.getElementById('submit-btn');

  const today = new Date().toISOString().split('T')[0];
  dateInput.min = today;

  const storageFields = ['name', 'name_kana', 'tel', 'email'];
  storageFields.forEach(field => {
    const saved = localStorage.getItem(`sis_${field}`);
    if (saved) {
      document.getElementById(field).value = saved;
      if (field === 'tel') document.getElementById('check-tel').value = saved;
      if (field === 'email') document.getElementById('check-email').value = saved;
    }
  });

  [dateInput, staffSelect, menuSelect].forEach(element => {
    element.addEventListener('change', updateAvailableTimes);
  });

  async function updateAvailableTimes() {
    const dateVal = dateInput.value;
    const staffVal = staffSelect.value;
    const menuVal = menuSelect.value;

    if (!dateVal || !staffVal || !menuVal) {
      timeSelect.disabled = true;
      timeSelect.innerHTML = '<option value="">日時とメニューを選択してください</option>';
      submitBtn.disabled = true;
      return;
    }

    timeSelect.disabled = true;
    timeSelect.innerHTML = '<option value="">空き状況を確認中...</option>';
    submitBtn.disabled = true;

    try {
      let fetchUrl = `${GAS_WEB_APP_URL}?method=getSlotStatuses&date=${dateVal}&staff=${encodeURIComponent(staffVal)}&menu=${encodeURIComponent(menuVal)}`;
      
      if (changeModeData && changeModeData.resId) {
        fetchUrl += `&resId=${encodeURIComponent(changeModeData.resId)}`;
      }

      const response = await fetch(fetchUrl);
      if (!response.ok) throw new Error('データ取得に失敗しました');
      const slotStatuses = await response.json();

      timeSelect.innerHTML = '<option value="">時間を選択してください</option>';

      if (slotStatuses.SHOP_HOLIDAY) {
        timeSelect.innerHTML = '<option value="">本日は定休日・または休業日です</option>';
        return;
      }

      const timeKeys = Object.keys(slotStatuses).sort();
      let selectableCount = 0;

      timeKeys.forEach(timeStr => {
        const status = slotStatuses[timeStr];
        const option = document.createElement('option');
        option.value = timeStr;

        if (status === "○") {
          option.textContent = `${timeStr}  〇`;
          selectableCount++;
        } else {
          option.textContent = `${timeStr}  ×`;
          option.disabled = true;
        }
        timeSelect.appendChild(option);
      });

      if (selectableCount > 0) {
        timeSelect.disabled = false;
        submitBtn.disabled = false;
      } else {
        timeSelect.innerHTML = '<option value="">申し訳ありません。本日はいっぱいです</option>';
      }

    } catch (error) {
      console.error('通信エラー:', error);
      timeSelect.innerHTML = '<option value="">エラーが発生しました。再試行してください</option>';
    }
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const confirmMsg = changeModeData 
      ? '選択した新しい日時で予約を変更してもよろしいですか？' 
      : 'この内容で予約を確定してもよろしいですか？';
      
    if (!confirm(confirmMsg)) return;

    submitBtn.disabled = true;
    submitBtn.textContent = changeModeData ? '予約を変更中...' : '予約を登録中...';

    storageFields.forEach(field => {
      localStorage.setItem(`sis_${field}`, document.getElementById(field).value);
    });

    // 💡 URLSearchParams から 純粋な JSON オブジェクト形式での送信に変更
    const payload = {};
    
    if (changeModeData) {
      payload.action = 'change';
      payload.resId = changeModeData.resId;
      payload.newDate = dateInput.value;
      payload.newTime = timeSelect.value;
    } else {
      payload.date = dateInput.value;
      payload.time = timeSelect.value;
    }
    
    payload.staff = staffSelect.value;
    payload.menu = menuSelect.value;
    payload.name = document.getElementById('name').value;
    payload.name_kana = document.getElementById('name_kana').value;
    payload.tel = document.getElementById('tel').value;
    payload.email = document.getElementById('email').value;
    payload.memo = document.getElementById('memo').value;

    try {
      const response = await fetch(GAS_WEB_APP_URL, {
        method: 'POST',
        body: JSON.stringify(payload), // 💡 JSON文字列として送信
        headers: { 'Content-Type': 'application/json' }
      });
      const data = await response.json();
      
      if (data && data.success !== false) {
        if (changeModeData) {
          alert('ご予約の変更が正常に完了しました！');
          abortChangeMode();
        } else {
          const resId = data.resId || data.id || '';
          const msg = resId ? `ご予約が完了しました！\n【ご予約ID: ${resId}】` : 'ご予約が完了しました！';
          alert(msg);
        }
        
        document.getElementById('check-tel').value = document.getElementById('tel').value;
        document.getElementById('check-email').value = document.getElementById('email').value;
        form.reset();
        timeSelect.innerHTML = '<option value="">日付を選択してください</option>';
        timeSelect.disabled = true;
        
        storageFields.forEach(field => {
          const saved = localStorage.getItem(`sis_${field}`);
          if (saved) document.getElementById(field).value = saved;
        });
        
      } else {
        alert('処理に失敗しました: ' + (data.message || '未知のエラーが発生しました'));
      }
    } catch (error) {
      console.error('送信エラー:', error);
      alert('通信エラーが発生しました。カレンダー等をご確認ください。');
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = '上記の内容で予約を確定する';
      updateAvailableTimes();
    }
  });

  async function fetchReservations() {
    const telInput = document.getElementById('check-tel').value.trim();
    const emailInput = document.getElementById('check-email').value.trim();
    const resultsArea = document.getElementById('check-results-area');
    const checkBtn = document.getElementById('check-btn');

    if (!telInput || !emailInput) {
      alert('携帯電話番号とメールアドレスの両方を入力してください。');
      return;
    }

    checkBtn.disabled = true;
    checkBtn.textContent = '検索中...';
    resultsArea.innerHTML = '<div class="no-data">予約データを検索しています。少々お待ちください...</div>';

    localStorage.setItem('sis_tel', telInput);
    localStorage.setItem('sis_email', emailInput);

    try {
      const response = await fetch(`${GAS_WEB_APP_URL}?method=getCustomerReservations&tel=${encodeURIComponent(telInput)}&email=${encodeURIComponent(emailInput)}`);
      if (!response.ok) throw new Error('通信エラーが発生しました');
      
      const result = await response.json();

      if (!result.success) {
        resultsArea.innerHTML = `<div class="no-data" style="color: red;">${result.message}</div>`;
        return;
      }

      if (result.reservations.length === 0) {
        resultsArea.innerHTML = '<div class="no-data">現在、条件に一致する今日以降のご予約はありません。</div>';
        return;
      }

      let htmlContent = '<h3 style="font-size:14px; margin-bottom:15px; color:var(--primary-color);">お客様のご予約状況</h3>';
      
      result.reservations.forEach((res, index) => {
        const dateParts = res.date.split('-');
        const formattedDate = dateParts.length === 3 ? `${dateParts[0]}年${dateParts[1]}月${dateParts[2]}日` : res.date;

        const timeParts = res.time.split(':');
        const formattedTime = timeParts.length >= 2 ? `${timeParts[0]}時${timeParts[1]}分` : res.time;

        const safeMenu = (res.menu || '').replace(/"/g, '&quot;');
        const safeStaff = (res.staff || '').replace(/"/g, '&quot;');
        const safeMemo = (res.memo || '').replace(/"/g, '&quot;');
        const safeId = (res.id || '').replace(/"/g, '&quot;');

        htmlContent += `
          <div class="reservation-card">
            <div class="res-row">
              <span class="res-label">予約ID</span> 
              <span class="res-id-badge">${safeId}</span>
            </div>
            <div class="res-row"><span class="res-label">予約日</span> ${formattedDate}</div>
            <div class="res-row"><span class="res-label">予約時間</span> ${formattedTime}</div>
            <div class="res-row"><span class="res-label">メニュー</span> ${res.menu}</div>
            <div class="res-row"><span class="res-label">担当</span> ${res.staff}</div>
            ${res.memo ? `<div class="res-row"><span class="res-label">備考・メモ</span> ${res.memo}</div>` : ''}
            <div class="res-created">⏱ 受付時間：${res.createdAt}</div>
            <div class="btn-action-group">
              <button type="button" class="btn-change" 
                      data-id="${safeId}" 
                      data-date="${res.date}" 
                      data-time="${res.time}" 
                      data-staff="${safeStaff}" 
                      data-menu="${safeMenu}" 
                      data-memo="${safeMemo}" 
                      onclick="startChangeMode(this)">日時を変更する</button>
              <button type="button" class="btn-cancel" data-id="${safeId}" onclick="requestCancel(this)">この予約をキャンセルする</button>
            </div>
          </div>
        `;
      });

      resultsArea.innerHTML = htmlContent;

    } catch (error) {
      console.error('予約検索エラー:', error);
      resultsArea.innerHTML = '<div class="no-data" style="color: red;">エラーが発生しました。時間を置いて再度お試しください。</div>';
    } finally {
      checkBtn.disabled = false;
      checkBtn.textContent = 'ご予約状況を確認する';
    }
  }

  function startChangeMode(buttonEl) {
    changeModeData = {
      resId: buttonEl.getAttribute('data-id'), 
      oldDate: buttonEl.getAttribute('data-date'),
      oldTime: buttonEl.getAttribute('data-time'),
      oldStaff: buttonEl.getAttribute('data-staff'),
      oldMenu: buttonEl.getAttribute('data-menu')
    };

    staffSelect.value = changeModeData.oldStaff;
    menuSelect.value = changeModeData.oldMenu;
    document.getElementById('memo').value = buttonEl.getAttribute('data-memo');
    dateInput.value = changeModeData.oldDate;

    document.getElementById('change-banner').style.display = 'block';
    submitBtn.textContent = '上記の内容で変更を確定する';

    const reserveTabBtn = document.getElementById('tab-btn-reserve');
    switchTab(reserveTabBtn, 'reserve-tab');

    updateAvailableTimes();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function abortChangeMode() {
    changeModeData = null;
    document.getElementById('change-banner').style.display = 'none';
    submitBtn.textContent = '上記の内容で予約を確定する';
    
    form.reset();
    storageFields.forEach(field => {
      const saved = localStorage.getItem(`sis_${field}`);
      if (saved) document.getElementById(field).value = saved;
    });
    timeSelect.innerHTML = '<option value="">日付を選択してください</option>';
    timeSelect.disabled = true;
  }

  async function requestCancel(buttonEl) {
    const resId = buttonEl.getAttribute('data-id');
    if (!resId) return;

    if (!confirm(`ご予約（ID: ${resId}）をキャンセルしてもよろしいですか？\n\n※この操作は取り消せません。`)) return;

    const resultsArea = document.getElementById('check-results-area');
    resultsArea.innerHTML = '<div class="no-data">予約のキャンセル処理を行っています。少々お待ちください...</div>';

    // 💡 キャンセル処理も JSON 形式での送信に統一
    const payload = {
      action: 'cancel',
      resId: resId
    };

    try {
      const response = await fetch(GAS_WEB_APP_URL, {
        method: 'POST',
        body: JSON.stringify(payload),
        headers: { 'Content-Type': 'application/json' }
      });
      const data = await response.json();

      if (data && data.success !== false) {
        alert('ご予約のキャンセルが正常に完了しました。');
      } else {
        alert('キャンセルに失敗しました: ' + (data.message || '未知のエラー'));
      }
      fetchReservations(); 
    } catch (error) {
      console.error('キャンセル通信エラー:', error);
      alert('通信エラーが発生しました。時間を置いて再度お試しください。');
      fetchReservations();
    }
  }
</script>

</body>
</html>
