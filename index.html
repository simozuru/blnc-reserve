<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIS Web Reservation - ver 3.0</title>
  <style>
    :root {
      --primary-color: #4a4a4a;
      --accent-color: #9a8873;
      --bg-color: #f8f9fa;
      --card-bg: #ffffff;
      --text-color: #333333;
      --border-color: #dddddd;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Helvetica Neue', Arial, sans-serif; }
    body { background-color: var(--bg-color); color: var(--text-color); padding: 20px; display: flex; justify-content: center; }
    .container { max-width: 600px; width: 100%; background: var(--card-bg); padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    h1 { font-size: 24px; text-align: center; margin-bottom: 5px; color: var(--primary-color); letter-spacing: 1px; }
    .subtitle { text-align: center; font-size: 13px; color: #888; margin-bottom: 30px; }
    .form-group { margin-bottom: 20px; }
    label { display: block; font-size: 14px; font-weight: bold; margin-bottom: 8px; color: var(--primary-color); }
    input, select, textarea { width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 15px; transition: all 0.3s; background-color: #fff; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent-color); box-shadow: 0 0 5px rgba(154,136,115,0.3); }
    .row { display: flex; gap: 15px; }
    .row .form-group { flex: 1; }
    textarea { resize: vertical; height: 80px; }
    button { width: 100%; padding: 15px; background-color: var(--accent-color); border: none; border-radius: 6px; color: white; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.3s; margin-top: 10px; }
    button:hover { background-color: #837362; }
    button:disabled { background-color: #ccc; cursor: not-allowed; }
    #loading { display: none; text-align: center; color: var(--accent-color); font-weight: bold; margin-top: 15px; font-size: 14px; }
  </style>
</head>
<body>

<div class="container">
  <h1>ヘアサロン Blnc</h1>
  <div class="subtitle">WEB予約システム (SIS prototype ver 3.0)</div>
  
  <form id="reservationForm">
    <div class="form-group">
      <label for="date">ご来店希望日</label>
      <input type="date" id="date" required>
    </div>

    <div class="row">
      <div class="form-group">
        <label for="staff">担当スタイリスト</label>
        <select id="staff" required>
          <option value="指名なし">指名なし（自動割り振り）</option>
          <option value="下鶴">下鶴</option>
          <option value="来馬">来馬</option>
          <option value="矢野">矢野</option>
        </select>
      </div>
      <div class="form-group">
        <label for="menu">メニュー</label>
        <select id="menu" required>
          <option value="カット">カット (60分)</option>
          <option value="カラー">カラー (120分)</option>
          <option value="パーマ">パーマ (120分)</option>
          <option value="縮毛矯正">縮毛矯正 (240分)</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label for="time">ご希望時間</label>
      <select id="time" required>
        <option value="">日付を選択してください</option>
      </select>
    </div>

    <hr style="border: 0; border-top: 1px dashed var(--border-color); margin: 25px 0;">

    <div class="row">
      <div class="form-group">
        <label for="name">お名前（氏名）</label>
        <input type="text" id="name" placeholder="山田 太郎" required>
      </div>
      <div class="form-group">
        <label for="name_kana">フリガナ</label>
        <input type="text" id="name_kana" placeholder="ヤマダ タロウ" required>
      </div>
    </div>

    <div class="row">
      <div class="form-group">
        <label for="tel">電話番号</label>
        <input type="tel" id="tel" placeholder="09012345678" required>
      </div>
      <div class="form-group">
        <label for="birthday">誕生日（任意）</label>
        <input type="date" id="birthday">
      </div>
    </div>

    <div class="form-group">
      <label for="email">メールアドレス</label>
      <input type="email" id="email" placeholder="example@mail.com" required>
    </div>

    <div class="form-group">
      <label for="memo">ご要望・サロンへのメッセージ</label>
      <textarea id="memo" placeholder="髪の悩みや、当日伝えたいことがあればご記入ください。"></textarea>
    </div>

    <button type="submit" id="submitBtn">予約を確定する</button>
    <div id="loading">処理中... しばらくお待ちください</div>
  </form>
</div>

<script>
  // ★ここに新しいGASのウェブアプリURLを貼り付けてください★
  const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzm1DAw3pJc160JcfnHspbk1ZOlmQlNle8DV_fN56hMkCY8jQmhOajt10uwO7ULhIy_/exec";

  const dateInput = document.getElementById('date');
  const staffSelect = document.getElementById('staff');
  const menuSelect = document.getElementById('menu');
  const timeSelect = document.getElementById('time');
  const form = document.getElementById('reservationForm');
  const submitBtn = document.getElementById('submitBtn');
  const loading = document.getElementById('loading');

  // キャッシュ復元
  window.addEventListener('DOMContentLoaded', () => {
    const fields = ['name', 'name_kana', 'tel', 'email', 'birthday'];
    fields.forEach(field => {
      const savedValue = localStorage.getItem(`sis_${field}`);
      if (savedValue) {
        document.getElementById(field).value = savedValue;
      }
    });
  });

  const today = new Date().toISOString().split('T')[0];
  dateInput.min = today;

  [dateInput, staffSelect, menuSelect].forEach(element => {
    element.addEventListener('change', fetchAvailableTimes);
  });

  async function fetchAvailableTimes() {
    const date = dateInput.value;
    const staff = staffSelect.value;
    const menu = menuSelect.value;

    if (!date) return;

    timeSelect.innerHTML = '<option value="">空き時間を計算中...</option>';
    submitBtn.disabled = true;

    try {
      const url = `${GAS_WEB_APP_URL}?method=getUnavailable&date=${date}&staff=${encodeURIComponent(staff)}&menu=${encodeURIComponent(menu)}`;
      const response = await fetch(url);
      const data = await response.json();

      if (data.success) {
        timeSelect.innerHTML = '';
        
        if (data.isShopHoliday) {
          timeSelect.innerHTML = '<option value="">本日は定休日（または特別休業日）です</option>';
          submitBtn.disabled = true;
          return;
        }

        const slotResults = [];
        let hasAvailableSlot = false;
        let detectedReasons = [];
        let totalSlotsCount = 0;

        for (let h = 9; h < 19; h++) {
          const hours = String(h).padStart(2, '0');
          ['00', '30'].forEach(m => {
            const timeStr = `${hours}:${m}`;
            totalSlotsCount++;
            const matchHoliday = data.unavailableTimes.find(t => t.startsWith(timeStr));

            if (matchHoliday) {
              const reason = matchHoliday.split('|')[1] || "受付不可";
              slotResults.push({ time: timeStr, available: false, reason: reason });
              if (!detectedReasons.includes(reason)) {
                detectedReasons.push(reason);
              }
            } else {
              slotResults.push({ time: timeStr, available: true, reason: "" });
              hasAvailableSlot = true;
            }
          });
        }

        // 1. 【終日チェックが入っている最初からのブロック時】の1行案内
        const isAllDayBlockedFromBeginning = data.unavailableTimes.length >= totalSlotsCount;
        const allSameReason = isAllDayBlockedFromBeginning && data.unavailableTimes.every(t => t.split('|')[1] === data.unavailableTimes[0].split('|')[1]);

        if (allSameReason) {
          const opt = document.createElement('option');
          opt.value = "";
          opt.disabled = true;
          opt.selected = true;

          const mainReason = data.unavailableTimes[0].split('|')[1];

          if (mainReason === "公休") {
            opt.textContent = `【 ${staff} 】は本日公休をいただいております`;
          } else if (mainReason === "勉強会のため予約は受け付けしていません") {
            opt.textContent = `【 ${staff} 】は本日勉強会のため終日ご予約を受け付けておりません`;
          } else if (mainReason === "満席") {
            opt.textContent = `本日はすべての時間帯で満席となっております`;
          } else {
            opt.textContent = `【 ${staff} 】は本日お休みをいただいております (${mainReason})`;
          }

          timeSelect.appendChild(opt);
          submitBtn.disabled = true;
          return;
        }

        // 2. 通常の30分刻み展開
        slotResults.forEach(slot => {
          const opt = document.createElement('option');
          opt.value = slot.time;

          if (!slot.available) {
            opt.textContent = `${slot.time} (× ${slot.reason})`;
            opt.disabled = true;
          } else {
            opt.textContent = `${slot.time} (○ 空きあり)`;
          }
          timeSelect.appendChild(opt);
        });

        // 💡【修正ポイント】選べる枠が1つもない（メニューの長さで埋まった）場合、先頭に「満席案内」を差し込む
        if (!hasAvailableSlot) {
          const noticeOpt = document.createElement('option');
          noticeOpt.value = "";
          noticeOpt.textContent = "本日はすべての時間帯で満席となっております";
          noticeOpt.selected = true;
          noticeOpt.disabled = true;
          timeSelect.insertBefore(noticeOpt, timeSelect.firstChild);
        }

        submitBtn.disabled = !hasAvailableSlot;

      } else {
        timeSelect.innerHTML = '<option value="">エラーが発生しました</option>';
      }
    } catch (error) {
      console.error(error);
      timeSelect.innerHTML = '<option value="">通信エラーが発生しました</option>';
    }
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    submitBtn.disabled = true;
    loading.style.display = 'block';

    const fields = ['name', 'name_kana', 'tel', 'email', 'birthday'];
    fields.forEach(field => {
      localStorage.setItem(`sis_${field}`, document.getElementById(field).value);
    });

    const formData = new URLSearchParams();
    formData.append('date', dateInput.value);
    formData.append('time', timeSelect.value);
    formData.append('staff', staffSelect.value);
    formData.append('menu', menuSelect.value);
    formData.append('name', document.getElementById('name').value);
    formData.append('name_kana', document.getElementById('name_kana').value);
    formData.append('tel', document.getElementById('tel').value);
    formData.append('email', document.getElementById('email').value);
    formData.append('birthday', document.getElementById('birthday').value);
    formData.append('memo', document.getElementById('memo').value);

    try {
      const response = await fetch(GAS_WEB_APP_URL, {
        method: 'POST',
        body: formData,
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
      });
      const data = await response.json();
      if (data.success) {
        alert('ご予約が完了しました！確定メールをご確認ください。');
        form.reset();
        timeSelect.innerHTML = '<option value="">日付を選択してください</option>';
      } else {
        alert('予約に失敗しました: ' + data.message);
        submitBtn.disabled = false;
      }
    } catch (error) {
      alert('通信エラーが発生しました。');
      submitBtn.disabled = false;
    } finally {
      loading.style.display = 'none';
    }
  });
</script>

</body>
</html>
