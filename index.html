<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>店名 予約</title>
  <style>
    body { font-family: sans-serif; background: #f5f5f5; padding: 20px; }
    .box { max-width: 420px; margin: auto; background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    h1 { text-align: center; font-size: 24px; margin-bottom: 20px; }
    label { font-size: 14px; color: #555; display: block; margin-top: 10px; }
    input, select, button { width: 100%; padding: 12px; margin: 6px 0 12px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
    button { background: #111; color: #fff; border: none; cursor: pointer; margin-top: 15px; }
    button:disabled { background: #ccc; }
    #msg { margin-top: 15px; text-align: center; font-weight: bold; color: #d32f2f; }
    .success { color: #2e7d32 !important; }
  </style>
</head>
<body>

<div class="box">
  <h1>店名 予約</h1>
  <label for="name">お名前</label>
  <input id="name" placeholder="苗字 名前">
  <label for="tel">電話番号</label>
  <input id="tel" type="tel" placeholder="09012345678">
  
  <label for="menu">メニュー</label>
  <select id="menu" onchange="updateTimeSlots()">
    <option>メニュー1 ¥0000</option>
    <option>メニュー2 ¥0000</option>
    <option>メニュー3 ¥0000</option>
    <option>メニュー4 ¥0000</option>
    <option>メニュー5 ¥0000</option>
  </select>

  <label for="staff">スタイリスト</label>
  <select id="staff" onchange="updateTimeSlots()">
    <option>指名なし</option>
    <option>下鶴</option>
    <option>来馬</option>
    <option>矢野</option>
  </select>

  <label for="date">ご希望日</label>
  <input type="date" id="date" onchange="updateTimeSlots()">

  <label for="time">ご希望時間</label>
  <select id="time" disabled>
    <option value="">日付とスタイリストを選んでください</option>
  </select>

  <button id="submit-btn" onclick="sendReserve()">予約する</button>
  <p id="msg"></p>
</div>

<script>
// 【重要】最新のGASのURLに書き換えてください
const gasUrl = "https://script.google.com/macros/s/AKfycbxlXYFw1nRdS3DbYTzuXC8ZU3E0ZtMj7EbeTKA6EKdPXjsQdxmdSxIQy7o1rQKO58jH/exec";

window.onload = function(){
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('date').min = today;
};

// 【最終兵器】CORSを完全に回避するJSONP関数
function requestJSONP(url) {
  return new Promise((resolve, reject) => {
    const callbackName = 'jsonp_cb_' + Math.round(100000 * Math.random());
    const script = document.createElement('script');
    
    window[callbackName] = function(data) {
      delete window[callbackName];
      document.body.removeChild(script);
      resolve(data);
    };

    script.onerror = () => {
      delete window[callbackName];
      document.body.removeChild(script);
      reject(new Error('通信エラーが発生しました'));
    };

    const sep = url.indexOf('?') === -1 ? '?' : '&';
    script.src = url + sep + 'callback=' + callbackName;
    document.body.appendChild(script);
  });
}

// 空き状況を考慮して時間選択肢を更新する関数
async function updateTimeSlots() {
  const staff = document.getElementById("staff").value;
  const date = document.getElementById("date").value;
  const menu = document.getElementById("menu").value; // メニューを取得
  const timeSelect = document.getElementById("time");
  const msgEl = document.getElementById("msg");

  if (!date) {
    timeSelect.disabled = true;
    timeSelect.innerHTML = '<option value="">日付を選択してください</option>';
    return;
  }

  // メッセージを消去せず、読み込み中だけ表示
  if(!timeSelect.innerHTML.includes("◯")) {
    timeSelect.disabled = true;
    timeSelect.innerHTML = '<option value="">空き状況を確認中...</option>';
  }

  try {
    // URLに &menu=... を追加してGASへ送信
    const fullUrl = `${gasUrl}?date=${date}&staff=${encodeURIComponent(staff)}&menu=${encodeURIComponent(menu)}`;
    const data = await requestJSONP(fullUrl);
    
    const bookedTimes = data.bookedTimes || [];
    const uniqueBookedTimes = [...new Set(bookedTimes)];

    timeSelect.innerHTML = "";
    let availableCount = 0;

    for(let h=9; h<=18; h++){
      for(let m=0; m<60; m+=30){
        if(h==18 && m>0) continue;
        const hh = ("0"+h).slice(-2);
        const mm = ("0"+m).slice(-2);
        const timeStr = hh + ":" + mm;

        const opt = document.createElement("option");
        opt.value = timeStr;

        if (uniqueBookedTimes.includes(timeStr)) {
          opt.textContent = timeStr + " (× 予約済み)";
          opt.disabled = true;
          opt.style.color = "#ccc";
        } else {
          opt.textContent = timeStr + " (◯ 空きあり)";
          availableCount++;
        }
        timeSelect.appendChild(opt);
      }
    }

    if(availableCount === 0) {
      timeSelect.innerHTML = '<option value="">この日は満席です</option>';
    } else {
      timeSelect.disabled = false;
    }

  } catch (e) {
    console.error(e);
    if(!msgEl.innerText.includes("送信")) {
      msgEl.innerText = "データの取得に失敗しました。";
    }
  }
}

// 予約送信処理
async function sendReserve(){
  const msgEl = document.getElementById("msg");
  const btnEl = document.getElementById("submit-btn");
  
  const name = document.getElementById("name").value.trim();
  const tel = document.getElementById("tel").value.trim();
  const menu = document.getElementById("menu").value;
  const staff = document.getElementById("staff").value;
  const date = document.getElementById("date").value;
  const time = document.getElementById("time").value;

  if(!name || !tel || !date || !time) {
    msgEl.style.color = "#d32f2f";
    msgEl.innerText = "すべての項目を入力してください。";
    return;
  }

  btnEl.disabled = true;
  msgEl.style.color = "#111";
  msgEl.innerText = "予約処理中...";

  const formData = new URLSearchParams();
  formData.append("name", name);
  formData.append("tel", tel);
  formData.append("menu", menu);
  formData.append("staff", staff);
  formData.append("date", date);
  formData.append("time", time);

  try {
    await fetch(gasUrl, {
      method: "POST",
      body: formData,
      mode: "no-cors",
    });

    msgEl.style.color = "#2e7d32";
    msgEl.innerText = "予約リクエストを送信しました！";
    
    document.getElementById("name").value = "";
    document.getElementById("tel").value = "";
    
    setTimeout(updateTimeSlots, 2500);

  } catch(e) {
    msgEl.style.color = "#2e7d32";
    msgEl.innerText = "送信完了！(反映をお待ちください)";
    setTimeout(updateTimeSlots, 2500);
  } finally {
    btnEl.disabled = false;
  }
}
</script>
</body>
</html>
