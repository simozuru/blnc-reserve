<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIS Web Reservation - ver 3.9.9.2</title>
  
  <!-- 💡【GAS安全対策】外部ファイルをインクルード関数経由でHTML内に強制展開 -->
  <?!= include('style'); ?>
</head>
<body>

<div id="gas-config-bridge" style="display: none;"></div>

<div class="container">
  <h1>SIS WEB RESERVATION</h1>
  <div class="subtitle">サロン予約システム (Version 3.9.9.2)</div>

  <div class="tabs">
    <button id="tab-btn-reserve" class="tab-btn active" data-tab="reserve-tab">新規予約</button>
    <button id="tab-btn-check" class="tab-btn" data-tab="check-tab">予約の確認・キャンセル</button>
  </div>

  <div id="reserve-tab" class="tab-content active">
    <div id="change-banner" class="change-alert-banner">
      現在 <strong>【予約日時を変更中】</strong> です。<br>
      <div class="change-alert-box">
        <strong class="change-alert-title">【変更前の予約内容】</strong>
        <div class="change-alert-row"><span class="res-label res-label-short">日時:</span><span id="prev-datetime" class="font-bold"></span></div>
        <div class="change-alert-row"><span class="res-label res-label-short">メニュー:</span><span id="prev-menu" class="font-bold"></span></div>
        <div class="change-alert-row"><span class="res-label res-label-short">担当者:</span><span id="prev-staff" class="font-bold"></span></div>
        <div class="change-alert-row"><span class="res-label res-label-short">予約ID:</span><span id="prev-id" class="font-bold"></span></div>
      </div>
      新しい日時を選択して、一番下の「変更を確定する」ボタンを押してください。
      <button type="button" id="cancel-change-btn" class="btn-cancel-change">➔ 変更をやめる</button>
    </div>

    <form id="reservation-form">
      <div class="form-group">
        <label for="date">ご来店希望日 *</label>
        <input type="date" id="date" required>
      </div>

      <div class="form-group" id="staff-group">
        <label for="staff">担当スタッフ *</label>
        <select id="staff" required></select>
      </div>

      <div class="form-group">
        <label for="menu">施術メニュー *</label>
        <select id="menu" required></select>
      </div>

      <div class="form-group">
        <label for="time">ご来店希望時間 *</label>
        <select id="time" required disabled>
          <option value="">日付を選択してください</option>
        </select>
      </div>

      <hr class="section-divider">

      <div class="form-group">
        <label for="name">お名前 (漢字) *</label>
        <input type="text" id="name" required placeholder="山田 太郎">
      </div>

      <!-- 💡【復活】顧客名簿のC列と連動させるため、フリガナ入力を必須項目として再配置 -->
      <div class="form-group">
        <label for="name_kana">お名前 (フリガナ) *</label>
        <input type="text" id="name_kana" required placeholder="ヤマダ タロウ">
      </div>

      <div class="form-group">
        <label for="tel">携帯電話番号 *</label>
        <input type="tel" id="tel" required placeholder="09012345678" pattern="^[0-9\-]+$">
        <div class="note">ハイフンはあってもなくても構いません</div>
      </div>

      <div class="form-group">
        <label for="email">メールアドレス *</label>
        <input type="email" id="email" required placeholder="example@gmail.com">
        <div class="note">予約の確認・自動キャンセル時に使用します</div>
      </div>

      <div class="form-group">
        <label for="memo">ご要望・備考</label>
        <textarea id="memo" placeholder="ご相談、ご用件などがあればご記入ください"></textarea>
      </div>

      <button type="submit" id="submit-btn" class="btn-submit" disabled>上記の内容で予約を確定する</button>
    </form>
  </div>

  <div id="check-tab" class="tab-content">
    <div class="form-group">
      <label for="check-tel">ご登録の携帯電話番号</label>
      <input type="tel" id="check-tel" placeholder="09012345678">
    </div>
    
    <div class="form-group">
      <label for="check-email">ご登録のメールアドレス</label>
      <input type="email" id="check-email" placeholder="example@gmail.com">
      <div class="note">ご予約時に入力した「電話番号」と「メールアドレス」で検索します。</div>
    </div>
    
    <button type="button" id="check-btn" class="btn-submit">ご予約状況を確認する</button>

    <hr class="section-divider">
    
    <div id="check-results-area">
      <div class="no-data">情報を入力して確認ボタンを押してください。</div>
    </div>
  </div>

</div>

<!-- 💡【GAS安全対策】ロジック関連ファイルをインクルード関数経由でHTML内に一括展開 -->
<?!= include('config_js'); ?>
<?!= include('storage_js'); ?>
<?!= include('api_js'); ?>
<?!= include('ui_js'); ?>

</body>
</html>
