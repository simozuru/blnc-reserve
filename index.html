<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>店名 予約</title>
  <style>
    body { font-family: sans-serif; background: #f5f5f5; padding: 20px; }
    .box { max-width: 420px; margin: auto; background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    h1 { text-align: center; font-size: 24px; margin-bottom: 20px; }
    label { font-size: 14px; color: #555; display: block; margin-top: 10px; }
    input, select, button { width: 100%; padding: 12px; margin: 6px 0 12px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
    button { background: #111; color: #fff; border: none; cursor: pointer; margin-top: 15px; }
    button:disabled { background: #ccc; }
    select option:disabled { color: #aaa; background: #f0f0f0; }
    #msg { margin-top: 15px; text-align: center; font-weight: bold; color: #d32f2f; }
  </style>
</head>
<body>

<div class="box">
  <h1>店名 予約</h1>
  <form id="reservationForm">
    <label for="name">お名前</label>
    <input id="name" name="name" placeholder="氏名" required>
    
    <label for="name_kana">お名前（フリガナ）</label>
    <input id="name_kana" name="name_kana" placeholder="カタカナ" required>
    
    <label for="tel">電話番号</label>
    <input id="tel" name="tel" type="tel" placeholder="09012345678" required>

    <label for="email">メールアドレス</label>
    <input id="email" name="email" type="email" placeholder="example@mail.com" required>
    
    <label for="menu">メニュー</label>
    <select id="menu" name="menu" onchange="updateTimeSlots()">
      <option>カット</option>
      <option>ヘアカラー</option>
      <option>パーマ</option>
      <option>縮毛矯正</option>
    </select>

    <label for="staff">スタイリスト</label>
    <select id="staff" name="staff" onchange="updateTimeSlots()">
      <option>指名なし</option><option>下鶴</option><option>来馬</option><option>矢野</option>
    </select>

    <label for="date">ご希望日</label>
    <input type="date" id="date" name="date" onchange="updateTimeSlots()" required>

    <label for="time">ご希望時間</label>
    <select id="time" name="time" disabled><option value="">日付とスタイリストを選んでください</option></select>

    <button type="submit" id="submit-btn">予約する</button>
  </form>
  <p id="msg"></p>
</div>

<script>
const gasUrl = "https://script.google.com/macros/s/AKfycbxR0eeYnfvCnEtYY3syfjN0PBGwTKN6WOYPxkL0sibbWvBejX1RyyUQJUApPf5gFsic/exec";

window.onload = function(){
  document.getElementById('date').min = new Date().toISOString().split('T')[0];
  const saved = localStorage.getItem('blnc_customer_data');
  if (saved) {
    const d = JSON.parse(saved);
    document.getElementById('name').value = d.name || "";
    document.getElementById('name_kana').value = d.name_kana || "";
    document.getElementById('tel').value = d.tel || "";
    document.getElementById('email').value = d.email || "";
  }
};

document.getElementById('reservationForm').onsubmit = async function(e) {
  e.preventDefault();
  const btn = document.getElementById("submit-btn");
  const msg = document.getElementById("msg");
  
  const customerData = {
    name: document.getElementById('name').value,
    name_kana: document.getElementById('name_kana').value,
    tel: document.getElementById('tel').value,
    email: document.getElementById('email').value
  };
  localStorage.setItem('blnc_customer_data', JSON.stringify(customerData));

  btn.disabled = true;
  msg.innerText = "予約処理中...";

  try {
    const response = await fetch(gasUrl, {
      method: "POST",
      body: new URLSearchParams(new FormData(this))
    });
    
    msg.style.color = "#2e7d32";
    msg.innerText = "予約が完了しました！";
    setTimeout(() => { msg.innerText = ""; updateTimeSlots(); }, 3000);
  } catch(e) {
    msg.style.color = "#d32f2f";
    msg.innerText = "送信に失敗しました。";
  } finally { btn.disabled = false; }
};

async function updateTimeSlots() {
  const [staff, date, menu] = [document.getElementById("staff").value, document.getElementById("date").value, document.getElementById("menu").value];
  const timeSelect = document.getElementById("time");
  if (!date) return;

  timeSelect.innerHTML = '<option>確認中...</option>';
  try {
    const res = await fetch(`${gasUrl}?date=${date}&staff=${encodeURIComponent(staff)}&menu=${encodeURIComponent(menu)}`);
    const data = await res.json();
    timeSelect.innerHTML = "";
    
    // 1. 定休日判定 (全体定休)
    if (data.status === "REGULAR_HOLIDAY") {
      const opt = document.createElement("option");
      opt.textContent = "定休日";
      opt.value = "";
      timeSelect.appendChild(opt);
      timeSelect.disabled = true;
      return;
    }

    // 2. 個人のシフト公休判定
    if (data.status === "STAFF_OFF") {
      const opt = document.createElement("option");
      opt.textContent = "公休";
      opt.value = "";
      timeSelect.appendChild(opt);
      timeSelect.disabled = true;
      return;
    }
    
    // 3. 通常の時間枠の生成
    let availableCount = 0;
    if (data.bookedTimes && Array.isArray(data.bookedTimes)) {
      for(let h=9; h<=18; h++) {
        for(let m=0; m<60; m+=30) {
          if(h==18 && m>0) continue;
          const timeStr = ("0"+h).slice(-2) + ":" + ("0"+m).slice(-2);
          const opt = document.createElement("option");
          opt.value = timeStr;
          
          if(data.bookedTimes.includes(timeStr)) {
            opt.textContent = `${timeStr} (受付終了)`;
            opt.disabled = true;
          } else {
            opt.textContent = timeStr;
            availableCount++;
          }
          timeSelect.appendChild(opt);
        }
      }
    }
    
    // 4. すべての時間枠が埋まっていた場合の判定
    if (availableCount === 0) {
      timeSelect.innerHTML = "";
      const opt = document.createElement("option");
      opt.textContent = "満席";
      opt.value = "";
      timeSelect.appendChild(opt);
      timeSelect.disabled = true;
    } else {
      timeSelect.disabled = false;
    }
  } catch(e) { 
    console.error(e); 
    timeSelect.innerHTML = '<option value="">エラーが発生しました</option>';
    timeSelect.disabled = true;
  }
}
</script>
</body>
</html>
